# Indica a Starship que no meta saltos de línea
add_newline = false

# NUEVO FORMATO: Git unificado en el bloque verde (2) y Duración de Comando en el azul (4)
format = """
[](fg:8)\
$username\
[](fg:8 bg:3)\
$directory\
[](fg:3 bg:2)\
$git_branch\
$git_status\
[](fg:2 bg:4)\
$cmd_duration\
[](fg:4 bg:5)\
$time\
[](fg:5)\
\n$character"""

# --- BLOQUE 1: USUARIO (Gris oscuro, texto claro) ---
[username]
show_always = true
style_user = "bg:8 fg:7"
style_root = "bg:8 fg:1"
format = '[󰣇 $user]($style)'

# --- BLOQUE 2: RUTA / DIRECTORIO (Naranja, texto oscuro) ---
[directory]
style = "bg:3 fg:0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

# --- BLOQUE 3: GIT BRANCH (Verde, texto oscuro) ---
[git_branch]
symbol = " "
style = "bg:2 fg:0"
format = '[ $symbol$branch ]($style)'

# --- BLOQUE 4: GIT STATUS (¡Ahora metido en el bloque VERDE!) ---
[git_status]
style = "bg:2 fg:0" # Usamos fondo verde (2) para unificarlo
format = '[$all_status$ahead_behind]($style)' # Espacios controlados internamente
conflicted = " "
ahead = "⇡ "
behind = "⇣ "
modified = " "
untracked = "? "

# --- BLOQUE 5: DURACIÓN DE COMANDO (Azul claro, texto oscuro) ---
[cmd_duration]
min_time = 2000 # Solo se muestra si el comando tarda más de 2 segundos
style = "bg:4 fg:0"
format = '[ 󱎫 $duration ]($style)'

# --- BLOQUE 6: RELOJ (Rosa/Púrpura, texto oscuro) ---
[time]
disabled = false
time_format = "%R"
style = "bg:5 fg:0"
format = '[  $time ]($style)'

# --- CARÁCTER DE ENTRADA (LÍNEA DE ABAJO) ---
[character]
success_symbol = "[➔](bold green) "
error_symbol = "[➔](bold red) "
